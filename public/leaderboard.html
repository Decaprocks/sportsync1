<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SportSync Leaderboard – See top ranked players across all sports based on ELO ratings.">
    <title>SportSync – Leaderboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand"><span class="brand-icon">🏟️</span> SportSync</a>
        <div class="navbar-nav" id="main-nav"></div>
        <div class="navbar-user" id="user-section"></div>
    </nav>

    <div class="main-content">
        <div class="page-header animate-in">
            <div>
                <h1>🏆 <span class="gradient-text">Leaderboard</span></h1>
                <p class="page-subtitle">Top players ranked by ELO skill rating</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar animate-in delay-1">
            <select class="form-control" id="filter-sport" onchange="loadLeaderboard()">
                <option value="all">All Sports</option>
                <option value="badminton">Badminton</option>
                <option value="tennis">Tennis</option>
                <option value="table_tennis">Table Tennis</option>
                <option value="football">Football</option>
            </select>
        </div>

        <!-- Leaderboard Table -->
        <div class="glass-card-static animate-in delay-2" id="leaderboard-container">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <p>Loading rankings...</p>
            </div>
        </div>

        <!-- Recent Matches -->
        <div class="glass-card-static animate-in delay-3" style="margin-top:1.5rem;">
            <div class="section-header">
                <h2>⚔️ Recent Matches</h2>
            </div>
            <div id="recent-matches">
                <div class="loading-overlay">
                    <div class="spinner"></div>
                    <p>Loading matches...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        (async () => {
            await App.init();
            loadLeaderboard();
            loadRecentMatches();
        })();

        async function loadLeaderboard() {
            const sport = document.getElementById('filter-sport').value;
            try {
                const players = await App.api(`/api/leaderboard?sport=${sport}`);
                if (players.length === 0) {
                    document.getElementById('leaderboard-container').innerHTML = '<div class="empty-state"><h3>No players found</h3></div>';
                    return;
                }

                document.getElementById('leaderboard-container').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr><th>Rank</th><th>Player</th><th>Rating</th><th>Tier</th><th>Wins</th><th>Losses</th><th>Draws</th><th>Win%</th><th>Sport</th><th>Location</th></tr></thead>
              <tbody>
                ${players.map((p, i) => {
                    const tier = App.getRatingTier(p.skill_rating);
                    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-default';
                    const isMe = App.user && p.player_id === App.user.user_id;
                    return `<tr style="${isMe ? 'background:rgba(59,130,246,0.08);' : ''}">
                    <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
                    <td><strong>${p.player_name}</strong> ${isMe ? '<span class="badge badge-blue">You</span>' : ''}</td>
                    <td style="font-weight:700;font-size:1.05rem;">${p.skill_rating}</td>
                    <td><span class="rating-tier ${tier.class}">${tier.name}</span></td>
                    <td style="color:var(--accent-green);">${p.wins}</td>
                    <td style="color:var(--accent-red);">${p.losses}</td>
                    <td>${p.draws}</td>
                    <td>${p.win_percentage}%</td>
                    <td style="text-transform:capitalize;">${p.sport_preference}</td>
                    <td style="color:var(--text-muted);">${p.location || '-'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
            } catch (err) {
                App.toast(err.message, 'error');
            }
        }

        async function loadRecentMatches() {
            try {
                const matches = await App.api('/api/matches?status=completed');
                if (matches.length === 0) {
                    document.getElementById('recent-matches').innerHTML = '<div class="empty-state"><p>No completed matches yet</p></div>';
                    return;
                }

                document.getElementById('recent-matches').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr><th>Date</th><th>Player 1</th><th>vs</th><th>Player 2</th><th>Sport</th><th>Score</th><th>Result</th></tr></thead>
              <tbody>
                ${matches.slice(0, 20).map(m => `<tr>
                  <td>${App.formatDate(m.match_date)}</td>
                  <td><strong>${m.player1_name}</strong> <span style="color:var(--text-muted);">(${m.player1_rating})</span></td>
                  <td style="color:var(--text-muted);">vs</td>
                  <td><strong>${m.player2_name}</strong> <span style="color:var(--text-muted);">(${m.player2_rating})</span></td>
                  <td>${m.sport}</td>
                  <td>${m.score || '-'}</td>
                  <td>${App.getResultBadge(m.result)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;
            } catch (err) {
                document.getElementById('recent-matches').innerHTML = '<div class="empty-state"><p>Could not load matches</p></div>';
            }
        }
    </script>
</body>

</html>
